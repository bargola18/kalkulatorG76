<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kalkulator G76 CNC</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0f172a"/>
  <style>
    body{font-family:sans-serif;background:#0f172a;color:#e2e8f0;margin:0;padding:16px}
   .card{background:#1e293b;padding:16px;border-radius:12px;margin-bottom:16px}
    input,select,button{width:100%;padding:12px;margin:6px 0;border-radius:8px;border:1px solid #334155;background:#0f172a;color:#e2e8f0}
    button{background:#3b82f6;font-weight:bold;border:none}
    button:active{opacity:0.8}
    pre{background:#0f172a;padding:12px;border-radius:8px;white-space:pre-wrap}
    label{font-size:14px;color:#94a3b8}
  </style>
</head>
<body>
  <div class="card">
    <h2>Kalkulator G76 Threading</h2>
    <label>Sistem</label>
    <select id="unit">
      <option value="metric">Metric mm</option>
      <option value="inch">Inch</option>
    </select>
    
    <label>Preset Ulir</label>
    <select id="preset">
      <option value="">Custom</option>
      <option value="6,1">M6 x 1</option>
      <option value="8,1.25">M8 x 1.25</option>
      <option value="10,1.5">M10 x 1.5</option>
      <option value="12,1.75">M12 x 1.75</option>
      <option value="16,2">M16 x 2</option>
      <option value="20,2.5">M20 x 2.5</option>
    </select>

    <label>Diameter Luar mm</label>
    <input id="dia" type="number" step="0.01" placeholder="20">
    
    <label>Pitch mm</label>
    <input id="pitch" type="number" step="0.01" placeholder="2.5">
    
    <label>Panjang Ulir mm</label>
    <input id="length" type="number" step="0.01" placeholder="30">
    
    <label>Tinggi Pahat mm</label>
    <input id="height" type="number" step="0.01" value="0.8">
    
    <button onclick="hitung()">Hitung & Generate G76</button>
  </div>
  
  <div class="card">
    <h3>Hasil G76</h3>
    <pre id="output">Isi data lalu klik tombol Hitung</pre>
    <button onclick="copy()">Copy G-Code</button>
  </div>

<script>
if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js')}

document.getElementById('preset').onchange = function(){
  if(this.value){
    let v = this.value.split(',');
    document.getElementById('dia').value = v[0];
    document.getElementById('pitch').value = v[1];
  }
}

function hitung(){
  let D = parseFloat(document.getElementById('dia').value);
  let P = parseFloat(document.getElementById('pitch').value);
  let L = parseFloat(document.getElementById('length').value);
  let H = parseFloat(document.getElementById('height').value);
  let unit = document.getElementById('unit').value;
  
  if(!D ||!P ||!L){alert('Lengkapi Diameter, Pitch, Panjang');return}
  
  let X = D - 2*H;
  let K = H;
  let Q = Math.round(K*1000/5);
  
  let gcode = `G76 P010060 Q${Q} R0.05\n`;
  gcode += `G76 X${X.toFixed(3)} Z-${L} P${Math.round(K*1000)} Q${Q} F${P}`;
  
  if(unit=='inch'){
    gcode = '; Unit Inch G20\nG20\n' + gcode;
  } else {
    gcode = '; Unit Metric G21\nG21\n' + gcode;
  }
  
  document.getElementById('output').textContent = gcode;
}

function copy(){
  navigator.clipboard.writeText(document.getElementById('output').textContent);
  alert('G-Code dicopy!');
}
</script>
</body>
</html>
