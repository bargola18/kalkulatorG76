<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kalkulator G76 CNC</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0f172a"/>
  <style>
    *{box-sizing:border-box}
    body{font-family:system-ui,sans-serif;background:#0f172a;color:#e2e8f0;margin:0;padding:16px}
  .card{background:#1e293b;padding:20px;border-radius:16px;margin-bottom:16px}
    h2{text-align:center;color:#60a5fa;margin:0 0 4px}
  .subtitle{text-align:center;color:#94a3b8;font-size:13px;margin-bottom:16px}
    label{display:block;font-size:14px;color:#94a3b8;margin:12px 0 6px}
    input,select,button{width:100%;padding:12px;border-radius:10px;border:1px solid #334155;background:#0f172a;color:#e2e8f0;font-size:16px}
    button{background:#3b82f6;font-weight:600;border:none;margin-top:16px;cursor:pointer}
    button:active{opacity:0.8}
  .row{display:flex;gap:12px}
  .row>div{flex:1}
  .badge{background:#3b82f6;color:white;font-size:11px;padding:2px 6px;border-radius:4px;margin-left:6px}
    pre{background:#0f172a;padding:16px;border-radius:10px;white-space:pre-wrap;font-size:14px;line-height:1.6}
  .copy{background:#334155;margin-top:12px}
  .fixed{color:#22c55e;font-size:12px}
  </style>
</head>
<body>
  <div class="card">
    <h2>Kalkulator G76 Threading</h2>
    <div class="subtitle">CNC Bubut Fanuc - Format 2 Baris</div>
    
    <label>Satuan</label>
    <select id="unit">
      <option value="metric">Metric mm</option>
      <option value="inch">Inch</option>
    </select>
    
    <label>Ukuran Ulir</label>
    <select id="preset">
      <option value="">Kosong / Custom</option>
      <option value="6,1">M6 x 1</option>
      <option value="8,1.25">M8 x 1.25</option>
      <option value="10,1.5">M10 x 1.5</option>
      <option value="12,1.75">M12 x 1.75</option>
      <option value="16,2">M16 x 2</option>
      <option value="20,2.5">M20 x 2.5</option>
      <option value="24,3">M24 x 3</option>
      <option value="30,3.5">M30 x 3.5</option>
      <option value="36,4">M36 x 4</option>
    </select>
    
    <label>Jenis Ulir</label>
    <select id="type">
      <option value="od">Ulir OD Luar</option>
      <option value="id">Ulir ID Dalam</option>
    </select>
    
    <label>Rumus Depth</label>
    <select id="rumus">
      <option value="0.6134">0.6134 × Pitch</option>
      <option value="0.62">0.62 × Pitch</option>
      <option value="0.64">0.64 × Pitch</option>
    </select>
    
    <div class="row">
      <div>
        <label>Diameter <span class="badge">mm</span></label>
        <input id="dia" type="number" step="0.01" placeholder="16">
      </div>
      <div>
        <label>Pitch <span class="badge">mm</span></label>
        <input id="pitch" type="number" step="0.01" placeholder="2">
      </div>
    </div>
    
    <label>Panjang Z- <span class="badge">mm</span></label>
    <input id="length" type="number" step="0.01" placeholder="20">
    
    <button onclick="hitung()">Hitung & Generate G76</button>
  </div>
  
  <div class="card">
    <h3 style="margin:0 0 12px">Hasil G76</h3>
    <div style="color:#94a3b8;font-size:13px;margin-bottom:8px">BARIS 1 FIXED <span class="fixed">G76 P030060 Q1000 R0.</span></div>
    <pre id="output">Isi data lalu klik tombol Hitung</pre>
    <button class="copy" onclick="copy()">Copy G-Code</button>
  </div>

<script>
if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js')}

document.getElementById('preset').onchange = function(){
  if(this.value){
    let v = this.value.split(',');
    document.getElementById('dia').value = v[0];
    document.getElementById('pitch').value = v[1];
  }
}

function hitung(){
  let D = parseFloat(document.getElementById('dia').value);
  let P = parseFloat(document.getElementById('pitch').value);
  let L = parseFloat(document.getElementById('length').value);
  let unit = document.getElementById('unit').value;
  let type = document.getElementById('type').value;
  let rumus = parseFloat(document.getElementById('rumus').value);
  
  if(!D ||!P ||!L){alert('Lengkapi Diameter, Pitch, Panjang');return}
  
  let H = rumus * P; 
  let X;
  
  if(type=='od'){
    X = D - 2*H;
  } else {
    X = D + 2*H;
  }
  
  let Q = Math.round(H*1000/5);
  let P_mic = Math.round(H*1000);
  
  // BARIS 1 FIX: P030060 Q1000 R0.
  let gcode = `G76 P030060 Q1000 R0.\n`;
  gcode += `G76 X${X.toFixed(3)} Z-${L} P${P_mic} Q${Q} F${P}`;
  
  if(unit=='inch'){
    gcode = 'G20 ; Inch\n' + gcode;
  } else {
    gcode = 'G21 ; Metric\n' + gcode;
  }
  
  document.getElementById('output').textContent = gcode;
}

function copy(){
  navigator.clipboard.writeText(document.getElementById('output').textContent);
  alert('G-Code dicopy!');
}
</script>
</body>
</html>
